<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Календарь съёмок — Фото/Видео</title>
<meta name="description" content="Календарь записи на фото и видеосъёмку">
<!-- Оптимизация для телефонов: запрет скейла пальцами для ощущения нативного приложения -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="header">
  <div class="logo">🎬 Съёмки <span id="syncStatus" class="status-dot red" title="Синхронизация отключена"></span></div>
  <div class="header-actions">
    <button id="todayBtn" class="btn-light">Сегодня</button>
    <button id="syncSettingsBtn" class="btn-light">☁️ Настроить Синхронизацию</button>
    <button id="exportCsvBtn" class="btn-light">📄 Скачать (Excel)</button>
  </div>
</header>

<section class="cal-legend">
  <div class="legend-item"><span class="dot has-events"></span>Есть записи</div>
  <div class="legend-item"><span class="dot today-dot"></span>Сегодня</div>
  <div class="legend-item">Всего записей: <strong id="totalCount">0</strong></div>
</section>

<section class="calendar-wrap">
  <div class="cal-nav">
    <button id="prevMonth">‹</button>
    <h2 id="monthLabel">—</h2>
    <button id="nextMonth">›</button>
  </div>
  <div class="cal-weekdays">
    <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span class="we">Сб</span><span class="we">Вс</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</section>

<section class="day-panel" id="dayPanel" style="display:none">
  <div class="day-panel-head">
    <h3 id="dayTitle">—</h3>
    <button id="dayClose">✕</button>
  </div>
  <div id="dayEventsList" class="day-events-list"></div>
  <button id="addEventBtn" class="big-btn">＋ Добавить съёмку на этот день</button>
</section>

<!-- Модалка добавления съёмки -->
<div id="eventModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Новая съёмка</h3>
    <p id="modalDateInfo" class="date-info"></p>
    
    <label>Название мероприятия *</label>
    <input type="text" id="fTitle" placeholder="Свадьба Анны и Ивана...">
    
    <label>Тип съёмки</label>
    <select id="fType">
      <option value="📸 Фотосъёмка">📸 Фотосъёмка</option>
      <option value="🎥 Видеосъёмка">🎥 Видеосъёмка</option>
      <option value="📸🎥 Фото + Видео">📸🎥 Фото + Видео</option>
      <option value="💍 Свадьба">💍 Свадьба</option>
      <option value="Другое">Другое</option>
    </select>

    <div class="row">
      <div class="col"><label>Начало *</label><input type="time" id="fTimeStart" value="10:00"></div>
      <div class="col"><label>Конец</label><input type="time" id="fTimeEnd" value="14:00"></div>
    </div>

    <div class="row">
      <div class="col"><label>Стоимость (₽)</label><input type="number" id="fPrice" placeholder="15000"></div>
      <div class="col"><label>Статус</label>
        <select id="fPaid">
          <option value="Не оплачено">Не оплачено</option>
          <option value="Предоплата">Предоплата</option>
          <option value="Оплачено">Оплачено</option>
        </select>
      </div>
    </div>

    <label>Имя клиента</label>
    <input type="text" id="fClient" placeholder="Имя">
    
    <label>Телефон / Telegram</label>
    <input type="text" id="fPhone" placeholder="+7 999 123-45-67">
    
    <label>Локация</label>
    <input type="text" id="fAddress" placeholder="Адрес">
    
    <label>Детали</label>
    <textarea id="fNote" rows="3" placeholder="Реквизит, пожелания..."></textarea>

    <div class="modal-btns">
      <button id="saveEventBtn" class="btn-save">💾 Сохранить</button>
      <button id="deleteEventBtn" class="btn-delete" style="display:none">🗑</button>
      <button id="cancelEventBtn" class="btn-cancel">Отмена</button>
    </div>
  </div>
</div>

<!-- Модалка настроек GitHub -->
<div id="githubModal" class="modal">
  <div class="modal-box">
    <h3>☁️ Настройка GitHub Sync</h3>
    <p class="date-info" style="margin-bottom:10px">Введите данные один раз, чтобы синхронизировать календарь на этом устройстве.</p>
    <label>Твой логин на GitHub</label>
    <input type="text" id="ghUser" placeholder="Например: gevdjan">
    <label>Название репозитория</label>
    <input type="text" id="ghRepo" placeholder="Например: calendar">
    <label>GitHub Token (Только ты будешь его видеть)</label>
    <input type="password" id="ghToken" placeholder="ghp_........................">
    <div class="modal-btns">
      <button id="saveGithubBtn" class="btn-save">Подключить</button>
      <button id="closeGithubBtn" class="btn-cancel">Закрыть</button>
    </div>
  </div>
</div>

<!-- Лоадер -->
<div id="loader" class="loader-overlay" style="display:none"><div class="spinner"></div><p>Синхронизация...</p></div>

<footer><p>© Календарь съёмок</p></footer>
<script src="app.js"></script>
</body>
</html>
